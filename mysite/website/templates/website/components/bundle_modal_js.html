{% comment %}
JS для модалки заявки на комплекс. Подключается через {% include %}
в блоке {% block extra_js %} на /bundles/ и /kompleks/<slug>/.

Логика вынесена в static/js/bundle_modal.js — inline <script> блокируется CSP.
API base передаётся через data-api-base, CSRF читается из cookie.
{% endcomment %}
{% load static %}
<div id="bundle-modal-config" data-api-base="{{ request.scheme }}://{{ request.get_host }}" hidden></div>
<script src="{% static 'js/bundle_modal.js' %}"></script>
