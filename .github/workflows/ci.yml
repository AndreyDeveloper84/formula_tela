name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mysite

    env:
      DJANGO_SETTINGS_MODULE: mysite.settings
      DJANGO_SECRET_KEY: test-secret
      DJANGO_DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ${{ github.workspace }}/mysite/data/test.sqlite3
      OPENAI_API_KEY: test-key
      YCLIENTS_PARTNER_TOKEN: ""
      YCLIENTS_USER_TOKEN: ""
      YCLIENTS_COMPANY_ID: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      YANDEX_METRIKA_TOKEN: ""
      YANDEX_METRIKA_COUNTER_ID: ""
      YANDEX_DIRECT_TOKEN: ""
      YANDEX_DIRECT_CLIENT_LOGIN: ""
      VK_ADS_TOKEN: ""
      VK_ADS_ACCOUNT_ID: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make data dir
        run: mkdir -p data

      - name: Install deps
        working-directory: .
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Django checks & DB migrate
        run: |
          python manage.py check
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django deployment checks (non-blocking)
        run: python manage.py check --deploy --fail-level WARNING || true

      - name: Audit dependencies for known CVEs
        working-directory: .
        run: |
          pip install pip-audit
          pip-audit --skip-editable || true

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing -q
