name: Deploy to Production (SSH)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest -q

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            REPO_DIR="${{ secrets.REPO_DIR }}"
            APP_DIR="${{ secrets.APP_DIR }}"
            VENV="${{ secrets.VENV }}"
            SERVICE="${{ secrets.SERVICE_NAME }}"
            
            BACKUP_DIR="/home/taximeter/backups"
            DATE=$(date +%Y%m%d_%H%M%S)
            
            mkdir -p "$BACKUP_DIR"
            
            echo "📦 Creating database backup..."
            if PGPASSWORD="${{ secrets.DB_PASSWORD }}" pg_dump -U mysite_prod_user -h localhost mysite_production > "$BACKUP_DIR/prod_${DATE}.sql"; then
              echo "✅ Backup saved: prod_${DATE}.sql"
            else
              echo "⚠️ Backup failed — continuing deploy without backup"
              rm -f "$BACKUP_DIR/prod_${DATE}.sql"
            fi

            # Удаляем старые бэкапы (старше 7 дней)
            find "$BACKUP_DIR" -name "prod_*.sql" -mtime +7 -delete || true

            cd "$REPO_DIR"
            
            # ВАЖНО: Сохраняем .env перед git pull
            if [ -f .env ]; then
              cp .env .env.backup
              echo "✅ .env backed up"
            fi
            
            # Подтягиваем main
            git fetch --all
            git checkout main
            git reset --hard origin/main
            
            # ВАЖНО: Восстанавливаем .env после git pull
            if [ -f .env.backup ]; then
              cp .env.backup .env
              echo "✅ .env restored"
            fi
            
            # Активируем venv
            source "$VENV/bin/activate"
            pip install -r requirements.txt
            
            export DJANGO_SETTINGS_MODULE=mysite.settings.production
            cd "$APP_DIR"

            echo "🔄 Pending migrations:"
            python manage.py showmigrations --plan 2>/dev/null | grep "\[ \]" || echo "  (none)"
            echo "🔄 Running migrations..."
            python manage.py migrate --noinput --verbosity 2
            echo "✅ Migrations done"

            echo "📦 Collecting static files..."
            python manage.py collectstatic --noinput
            echo "✅ Static files collected"

            python manage.py check --deploy || true
            
            # Перезапускаем
            sudo systemctl restart "$SERVICE"

      - name: Health check
        run: |
          sleep 5
          response=$(curl -L -s -o /dev/null -w "%{http_code}" ${{ secrets.HEALTH_URL }})
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed: $response"
          else
            echo "❌ Health check failed: $response"
            exit 1
          fi