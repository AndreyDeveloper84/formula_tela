name: Deploy to Staging (SSH)

on:
  push:
    branches: [ dev ]
  workflow_dispatch: {}

concurrency:
  group: stg-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: 22
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            REPO_DIR="${{ secrets.REPO_DIR }}"
            APP_DIR="${{ secrets.APP_DIR }}"
            VENV="${{ secrets.VENV }}"
            SERVICE="${{ secrets.SERVICE_NAME }}"
            
            BACKUP_DIR="/home/taximeter/backups"
            DATE=$(date +%Y%m%d_%H%M%S)
            
            mkdir -p "$BACKUP_DIR"
            
            echo "📦 Creating database backup..."
            PGPASSWORD="${{ secrets.DB_PASSWORD_STAGING  }}" pg_dump -U mysite_stage_user  -h localhost mysite_stage > "$BACKUP_DIR/stage_${DATE}.sql"
            
            # Удаляем старые бэкапы (старше 7 дней)
            find "$BACKUP_DIR" -name "stage_*.sql" -mtime +7 -delete
            
            echo "✅ Backup saved: stage_${DATE}.sql"

            cd "$REPO_DIR"
            
            # ВАЖНО: Сохраняем .env перед git pull
            if [ -f .env ]; then
              cp .env .env.backup
              echo "✅ .env backed up"
            fi
            
            # Подтягиваем ветку dev
            git fetch --all --prune
            git checkout dev
            git reset --hard origin/dev
            
            # ВАЖНО: Восстанавливаем .env после git pull
            if [ -f .env.backup ]; then
              cp .env.backup .env
              echo "✅ .env restored"
            fi
            
            # Активируем venv и обновляем зависимости
            source "$VENV/bin/activate"
            pip install -r requirements.txt
            
            export DJANGO_SETTINGS_MODULE=mysite.settings.staging
            # Django рутины
            cd "$APP_DIR"
            echo "🔄 Checking migration status..."
            python manage.py showmigrations services_app | tail -20 || true
            echo "🔄 Running migrations..."
            python manage.py migrate --noinput --verbosity 2
            echo "✅ Migrations completed"
            echo "🔍 Verifying migration status..."
            python manage.py showmigrations services_app | grep -E "\[X\]|\[ \]" | tail -5 || true
            
            echo "📦 Collecting static files..."
            # Очищаем старые статические файлы перед сборкой (опционально, для чистоты)
            # rm -rf staticfiles/* || true
            
            # Собираем статические файлы с подробным выводом
            python manage.py collectstatic --noinput --verbosity 2
            
            echo "✅ Static files collected"
            echo "📊 Checking static files..."
            ls -lh staticfiles/css/main.css || echo "⚠️ main.css not found in staticfiles"
            
            python manage.py check --deploy || true
            
            # Перезапускаем gunicorn
            sudo systemctl restart "$SERVICE"

      - name: Health check
        run: |
          sleep 5
          curl -fsS ${{ secrets.HEALTH_URL }} || echo "⚠️ Health check failed (non-blocking)"
        continue-on-error: true