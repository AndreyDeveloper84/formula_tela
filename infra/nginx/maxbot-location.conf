# MAX-бот webhook — добавляется внутрь существующего 443 server-блока
# в /etc/nginx/sites-enabled/formula_tela.
#
# maxbot uvicorn слушает 127.0.0.1:8003 (через MAX_WEBHOOK_HOST/PORT в .env).
# nginx проксирует только наш path (по умолчанию /api/maxbot/webhook/).

location /api/maxbot/webhook/ {
    proxy_pass http://127.0.0.1:8003;
    include proxy_params;
    proxy_read_timeout 30s;
    client_max_body_size 1m;

    # MAX отправляет компактные JSON updates — большие лимиты не нужны.
    # Если когда-то будут вложения через webhook — поднять client_max_body_size.
}
